version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gratifikasi}
      POSTGRES_USER: ${POSTGRES_USER:-gratifikasi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gratifikasi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gratifikasi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/mlflow;
      echo 'Bucket created';
      "

  init-db:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-gratifikasi}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      psql -h db -U ${POSTGRES_USER:-gratifikasi} -d ${POSTGRES_DB:-gratifikasi} -c 'CREATE DATABASE mlflow;' || true
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      init-db:
        condition: service_completed_successfully
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-gratifikasi}:${POSTGRES_PASSWORD:-gratifikasi}@db:5432/mlflow
        --default-artifact-root s3://mlflow/
        --host 0.0.0.0
        --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratifikasi}:${POSTGRES_PASSWORD:-gratifikasi}@db:5432/${POSTGRES_DB:-gratifikasi}
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai:8001
      SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web

  ai:
    build:
      context: .
      dockerfile: infra/docker/ai.Dockerfile
    ports:
      - "8001:8001"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      MODEL_URI: ${MODEL_URI:-models:/gratifikasi_classifier/Production}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.85}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - qdrant
      - mlflow

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratifikasi}:${POSTGRES_PASSWORD:-gratifikasi}@db:5432/${POSTGRES_DB:-gratifikasi}
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai:8001
      SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    command: ["celery", "-A", "gratifikasi", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratifikasi}:${POSTGRES_PASSWORD:-gratifikasi}@db:5432/${POSTGRES_DB:-gratifikasi}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  trainer:
    build:
      context: .
      dockerfile: infra/docker/trainer.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gratifikasi}:${POSTGRES_PASSWORD:-gratifikasi}@db:5432/${POSTGRES_DB:-gratifikasi}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      BASE_MODEL: ${BASE_MODEL:-indobenchmark/indobert-base-p1}
      PROMOTE_F1_THRESHOLD: ${PROMOTE_F1_THRESHOLD:-0.85}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      TRAIN_DATA_PATH: ${TRAIN_DATA_PATH:-}
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    profiles:
      - trainer

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
